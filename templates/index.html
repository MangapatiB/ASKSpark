<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ASK Spark - Support Bot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="static/style.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="h-screen flex bg-gray-100">
  <!-- Sidebar: Chat Sessions -->
  <aside class="w-64 bg-white border-r flex flex-col">
    <div class="p-4 border-b flex justify-between items-center">
     <div class="flex justify-end p-2">
      <img src="static/image.png" 
          alt="Robot Mascot Logo" 
          class="h-12 md:h-16 lg:h-20 object-contain" />
    </div>
      <div class="flex items-center bg-[#8D3B90] text-white p-2 rounded">
        <h2 class="text-lg font-bold">New Chat</h2>
        <button id="new-chat" 
                class="ml-2 bg-[#8D3B90] text-white rounded hover:bg-[#7a337f]" 
                title="New Chat">
          <i data-lucide="plus-circle"></i>
        </button>
      </div>
    </div>
    <ul id="chat-sessions" class="flex-1 overflow-y-auto"></ul>
  </aside>

  <!-- Main Chat -->
  <div class="flex-1 flex flex-col relative">
    <!-- Header -->
    <header class="p-4 border-b bg-white flex items-center gap-3">
     <div
        class="w-12 h-12 rounded-lg flex items-center justify-center text-white font-bold text-1xl"
        style="background-color: #8D3B90"
      >
        <img 
          src="{{ url_for('static', filename='image.png') }}" 
          alt="SOG" 
          class="w-10 h-10 object-contain"
        />
      </div>
      <!--<div  style="display: flex; align-items: baseline; gap: 8px;">
        <h1 class="text-2xl font-bold">ASK Spark</h1>
        <p class="text-sm text-gray-500">AI assistant</p>
      </div>-->
      <div style="display: flex; flex-direction: column;">
    	<span style="font-weight: bold; font-size: 1.25rem; white-space: nowrap;">ASK Spark</span>
    	<span style="font-size: 0.875rem; color: #6B7280;">AI assistant</span>
      </div>
       <div class="top-bar">
        <span>Welcome, {{ username }}</span><br>
        <a href="/logout">Logout</a>
       </div>
        <div class="banner-container">
        <img src="https://mma.prnewswire.com/media/1135912/Sparklight_Logo.jpg?p=facebook"
       alt="Subscriber Banner"
       class="bannar" />
     </div>
    </header>
    
    <!-- Chat Window -->
    <main
     id="chat-window"
     class="flex-1 overflow-y-auto p-3 space-y-4 bg-gray-50"
     tabindex="0"
     ></main>

    <!-- Input Area -->
    <footer class="p-4 border-t bg-white relative flex items-center gap-2">
      <textarea
        id="message-input"
        placeholder="Ask a question or run a tool..."
        class="flex-1 border rounded p-2 resize-none"
        rows="1"
      ></textarea>
      <button
        id="run-tool-button"
        class="w-10 h-10 flex items-center justify-center text-gray-500 hover:text-purple-600"
        title="Run tool"
      >
        <i data-lucide="wrench"></i>
      </button>
      <!--<button
        id="run-tool-button"
        class="w-10 h-10 flex items-center justify-center text-gray-400 cursor-not-allowed opacity-50"
        title="This functionality is planned for Phase 2 release"
        disabled
      >
        <i data-lucide="wrench"></i>
      </button>-->
      <button
        id="send-btn"
        class="bg-purple-600 text-white px-4 py-2 rounded flex items-center gap-1"
      >
        <i data-lucide="send"></i> Send
      </button>
    
   </footer>

    <!-- Tools Flyout -->
    <div
      id="tools-panel"
      class="hidden absolute bottom-20 right-4 w-96 bg-white shadow-lg border rounded-lg p-4 z-20 max-h-96 overflow-auto"
    >
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold">Run a Diagnostic Tool</h3>
        <button
          id="close-tools-panel"
          class="text-gray-400 hover:text-gray-600"
          title="Close tools panel"
        >
          <i data-lucide="x"></i>
        </button>
      </div>

       <label for="company-select" class="text-sm font-semibold">Select</label>
      <select id="company-select" class="w-full border rounded p-2 mt-1 mb-4">
        <option value="" selected disabled>Choose Team</option>
        <option value="TCC">TCC</option>
        <option value="VCC">VCC</option>
        <option value="RiskRadar">RiskRadar</option>
      </select>      

      <label for="account-number" class="text-sm font-semibold">Account Number</label>
      <input type="text" id="account-number" placeholder="e.g., 12345678910" class="w-full border rounded p-2 mt-1 mb-4" />

      <p class="text-sm font-semibold mb-1">Select Tool</p>
      <div id="tools-container" class="grid grid-cols-2 gap-2">
        <!-- Tools buttons inserted here dynamically -->
      </div>
    </div>
  </div>

  <!-- Message Template for Tool Output -->
  <div id="tool-output-container"></div>
  <template id="tool-output-template">
  <div class="flex items-start gap-3">
    <div
      class="flex-shrink-0 w-10 h-10 rounded-full bg-blue-600 text-white flex items-center justify-center"
    >
      <i data-lucide="wrench"></i>
    </div>
    <div class="bg-white shadow p-3 rounded w-full">
      <p class="text-sm font-semibold">
        Tool executed:
        <span class="tool-name font-bold"></span> on Account:
        <span class="account-id font-bold"></span>
      </p>
      <div
        class="tool-results mt-2 whitespace-pre-wrap"
      ></div>
    </div>
  </div>
</template>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="static/script.js"></script>
</body>
</html>
